<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 450 300">
	<defs>
		<linearGradient id="Drapelul" x1="0" x2="1" y1="0" y2="0" gradientUnits="objectBoundingBox">
			<stop offset="0" stop-color="#002B7F"/>
			<stop offset="0.3333333333" stop-color="#002B7F"/>
			<stop offset="0.3333333333" stop-color="#FCD116"/>
			<stop offset="0.6666666667" stop-color="#FCD116"/>
