<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin PULA — Prețuri</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0a;
            color: #eee;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #panou {
            background: #111;
            border: 2px solid #ce1126;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 520px;
        }
        h1 {
            color: #fcd116;
            font-size: 1.3rem;
            margin-bottom: 6px;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 24px;
        }
        .grup {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        label {
            color: #fcd116;
            font-size: 0.85rem;
            width: 130px;
            flex-shrink: 0;
        }
        input[type="number"], input[type="date"] {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            padding: 6px 10px;
            flex: 1;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #ce1126;
        }
        .unitate {
            color: #888;
            font-size: 0.8rem;
            width: 50px;
            text-align: left;
        }
        hr {
            border: none;
            border-top: 1px solid #222;
            margin: 18px 0;
        }
        #btnSalveaza {
            width: 100%;
            background: #ce1126;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
            padding: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        #btnSalveaza:hover { background: #a50e1e; }
        #status {
            margin-top: 14px;
            font-size: 0.85rem;
            text-align: center;
            min-height: 20px;
        }
        .ok { color: #4caf50; }
        .err { color: #f44336; }
        .ultima-actualizare {
            margin-top: 18px;
            font-size: 0.75rem;
            color: #555;
            text-align: center;
        }
        #btnDescarca {
            width: 100%;
            background: #1a1a1a;
            color: #fcd116;
            border: 1px solid #fcd116;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            padding: 8px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        #btnDescarca:hover { background: #222; }
    </style>
</head>
<body>
<div id="panou">
    <h1>⚙ ADMIN PULA</h1>
    <div class="subtitle">Editează prețurile benzii defilante</div>

    <div class="grup">
        <label>1 CĂRUȚĂ (RON)</label>
        <input type="number" id="ron" step="0.01" min="0">
        <span class="unitate">RON</span>
    </div>
    <div class="grup">
        <label>1 CĂRUȚĂ (USD)</label>
        <input type="number" id="usd" step="0.01" min="0">
        <span class="unitate">USD</span>
    </div>
    <div class="grup">
        <label>1 CĂRUȚĂ (EUR)</label>
        <input type="number" id="eur" step="0.01" min="0">
        <span class="unitate">EUR</span>
    </div>
    <div class="grup">
        <label>1 CĂRUȚĂ (BWP)</label>
        <input type="number" id="bwp" step="0.01" min="0">
        <span class="unitate">BWP</span>
    </div>
    <div class="grup">
        <label>1 CĂRUȚĂ (SOL)</label>
        <input type="number" id="sol" step="0.00001" min="0">
        <span class="unitate">SOL</span>
    </div>
    <div class="grup">
        <label>1 CĂRUȚĂ (BTC)</label>
        <input type="number" id="btc" step="0.000000001" min="0">
        <span class="unitate">BTC</span>
    </div>
    <div class="grup">
        <label>1 CĂRUȚĂ (ETH)</label>
        <input type="number" id="eth" step="0.00000001" min="0">
        <span class="unitate">ETH</span>
    </div>

    <hr>

    <div class="grup">
        <label>Market Cap (USD)</label>
        <input type="number" id="market_cap_usd" step="1" min="0">
        <span class="unitate">USD</span>
    </div>
    <div class="grup">
        <label>Supply total</label>
        <input type="number" id="supply" step="1" min="0">
        <span class="unitate">PULA</span>
    </div>
    <div class="grup">
        <label>Data actualizare</label>
        <input type="date" id="schimbat">
        <span class="unitate"></span>
    </div>

    <button id="btnSalveaza">💾 SALVEAZĂ</button>
    <button id="btnDescarca">⬇ Descarcă pret.json (pentru deploy)</button>
    <div id="status"></div>
    <div class="ultima-actualizare" id="ultimaActualizare"></div>
</div>

<script>
(function() {
    var PAROLA = 'PULA2026';

    var introdus = prompt('🔐 Parolă admin:');
    if (introdus !== PAROLA) {
        document.body.innerHTML = '<div style="color:#f44336;font-family:monospace;margin:40px auto;text-align:center;font-size:1.2rem;">⛔ Acces interzis.</div>';
        return;
    }

    var campuri = ['ron','usd','eur','bwp','sol','btc','eth','market_cap_usd','supply','schimbat'];
    var status = document.getElementById('status');
    var ultimaActualizare = document.getElementById('ultimaActualizare');

    function setStatus(msg, tip) {
        status.textContent = msg;
        status.className = tip || '';
    }

    function afiseazaData(d) {
        if (d && d.schimbat) {
            ultimaActualizare.textContent = 'Ultima actualizare: ' + d.schimbat;
        }
    }

    function incarcaFormular(d) {
        campuri.forEach(function(c) {
            var el = document.getElementById(c);
            if (el && d[c] !== undefined) el.value = d[c];
        });
        afiseazaData(d);
    }

    function citesteFormular() {
        var d = {};
        campuri.forEach(function(c) {
            var el = document.getElementById(c);
            if (!el) return;
            if (c === 'schimbat') {
                d[c] = el.value;
            } else {
                d[c] = parseFloat(el.value) || 0;
            }
        });
        return d;
    }

    function salveazaLocalStorage(d) {
        try {
            localStorage.setItem('pula_pret', JSON.stringify(d));
            return true;
        } catch(e) { return false; }
    }

    function descarcaJson(d) {
        var json = JSON.stringify(d, null, 2);
        var blob = new Blob([json], {type: 'application/json'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'pret.json';
        a.click();
        setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    }

    // Încearcă să salveze direct în fișier via File System Access API (Chrome local)
    function salveazaFisier(d) {
        var json = JSON.stringify(d, null, 2);
        if (window.showSaveFilePicker) {
            window.showSaveFilePicker({
                suggestedName: 'pret.json',
                types: [{ description: 'JSON', accept: {'application/json': ['.json']} }]
            }).then(function(fh) {
                return fh.createWritable();
            }).then(function(w) {
                return w.write(json).then(function() { return w.close(); });
            }).then(function() {
                salveazaLocalStorage(d);
                setStatus('✓ Salvat în fișier + localStorage!', 'ok');
                afiseazaData(d);
            }).catch(function(e) {
                if (e.name !== 'AbortError') {
                    // Fallback: localStorage + download
                    salveazaLocalStorage(d);
                    setStatus('⚠ Nu s-a putut scrie direct. Salvat în localStorage. Apasă "Descarcă" pentru deploy.', 'ok');
                    afiseazaData(d);
                }
            });
        } else {
            salveazaLocalStorage(d);
            setStatus('✓ Salvat în localStorage. Apasă "Descarcă" pentru a obține pret.json actualizat.', 'ok');
            afiseazaData(d);
        }
    }

    document.getElementById('btnSalveaza').addEventListener('click', function() {
        var d = citesteFormular();
        if (!d.schimbat) d.schimbat = new Date().toISOString().slice(0,10);
        salveazaFisier(d);
    });

    document.getElementById('btnDescarca').addEventListener('click', function() {
        var d = citesteFormular();
        if (!d.schimbat) d.schimbat = new Date().toISOString().slice(0,10);
        descarcaJson(d);
        setStatus('⬇ JSON descărcat. Pune-l în /admin/pret.json și deployează.', 'ok');
    });

    // Încarcă valorile curente din pret.json sau localStorage
    fetch('pret.json?v=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(d) {
            incarcaFormular(d);
            setStatus('', '');
        })
        .catch(function() {
            var ls = localStorage.getItem('pula_pret');
            if (ls) {
                try { incarcaFormular(JSON.parse(ls)); setStatus('(din localStorage)', ''); }
                catch(e) {}
            }
        });
})();
</script>
</body>
</html>
